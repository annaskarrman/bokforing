<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="apple-touch-icon-pg.png">
<title>Palmgrens garage</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f4f4;
    --surface: #ffffff;
    --surface2: #f9f9f9;
    --border: #e0e0e0;
    --border2: #cccccc;
    --text: #1a1a1a;
    --text-muted: #666666;
    --text-dim: #999999;
    --blue: #0055a5;
    --blue-dark: #003f7d;
    --blue-light: #e8f0fb;
    --red: #e3000b;
    --income: #2e7d32;
    --income-bg: #f1f8f1;
    --expense: #e3000b;
    --expense-bg: #fdecea;
    --expense-border: #ffcdd2;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Open Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--blue);
    border-bottom: 4px solid var(--red);
    padding: 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  header img.logo {
    height: 80px;
    width: auto;
    background: white;
    border-radius: 6px;
    padding: 6px 10px;
  }

  header span.bokforing-title {
    font-size: 1rem;
    color: rgba(255,255,255,0.85);
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 24px;
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 24px;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .panel-header {
    padding: 14px 20px;
    background: var(--blue);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ffffff;
  }

  .form-body { padding: 20px; }

  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .type-btn {
    padding: 10px;
    border-radius: 4px;
    border: 2px solid var(--border2);
    background: var(--surface2);
    cursor: pointer;
    font-family: 'Open Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .type-btn.income.active {
    background: var(--income-bg);
    border-color: var(--income);
    color: var(--income);
  }

  .type-btn.expense.active {
    background: var(--expense-bg);
    border-color: var(--expense);
    color: var(--expense);
  }

  .type-btn:not(.active):hover { border-color: var(--blue); color: var(--blue); }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    padding: 10px 12px;
    font-family: 'Open Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }

  input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(0,85,165,0.15); }

  .add-btn {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    border-radius: 4px;
    border: none;
    background: var(--red);
    color: #ffffff;
    font-family: 'Open Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: background 0.15s, transform 0.1s;
  }

  .add-btn:hover { background: #c0000a; }
  .add-btn:active { transform: scale(0.98); }

  .period-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .period-panel .field { margin: 0; flex: 1; min-width: 140px; }

  .reset-btn {
    padding: 10px 16px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text-muted);
    font-family: 'Open Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--blue); color: var(--blue); background: #e8f0fb; }

  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .s-balance-wrap {
    grid-column: 1 / -1;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .summary-card .s-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .summary-card .s-amount {
    font-size: 1.35rem;
    font-weight: 700;
  }

  .s-income { border-top: 3px solid var(--income); }
  .s-income .s-amount { color: var(--income); }

  .s-expense { border-top: 3px solid var(--expense); }
  .s-expense .s-amount { color: var(--expense); }

  .s-balance { border-top: 3px solid var(--blue); background: #e8f0fb; }
  .s-balance .s-amount { color: var(--blue); font-size: 1.45rem; }
  .s-balance.negative { border-top-color: var(--expense); background: var(--expense-bg); }
  .s-balance.negative .s-amount { color: var(--expense); }

  .list-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .list-header {
    padding: 14px 20px;
    background: var(--blue);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .list-header span:first-child {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #ffffff;
  }

  .list-header span#txCount {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.75);
  }

  .empty {
    padding: 50px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .tx-row {
    display: grid;
    grid-template-columns: 90px 1fr 130px 36px;
    gap: 12px;
    align-items: center;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .tx-row:last-child { border-bottom: none; }
  .tx-row:hover { background: var(--surface2); }

  .tx-date {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-weight: 600;
  }

  .tx-desc {
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
  }

  .tx-amount {
    font-size: 0.95rem;
    font-weight: 700;
    text-align: right;
  }

  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }

  .del-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.15s;
  }

  .del-btn:hover { background: var(--expense-bg); color: var(--expense); border-color: var(--expense); }

  .period-label {
    font-size: 0.72rem;
    color: #666666;
    font-style: italic;
    font-weight: 400;
    display: block;
  }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .summary { grid-template-columns: 1fr 1fr; }
    header { padding: 16px 20px; }
  }
</style>

<style>
  .login-screen {
    position: fixed;
    inset: 0;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    gap: 0;
  }

  .login-box {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    padding: 32px 28px;
    width: 90%;
    max-width: 360px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 24px;
  }

  .login-logo img {
    height: 90px;
    width: auto;
  }

  .login-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    text-align: center;
    margin-bottom: 20px;
  }

  .login-field { margin-bottom: 14px; }

  .login-btn {
    width: 100%;
    padding: 13px;
    border-radius: 4px;
    border: none;
    background: #e3000b;
    color: white;
    font-family: 'Open Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  .login-btn:hover { background: #c0000a; }

  .login-error {
    color: #e3000b;
    font-size: 0.82rem;
    text-align: center;
    margin-top: 10px;
    min-height: 20px;
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <img src="logo.JPG" alt="Palmgrens Garage" />
    </div>
    <div class="login-title">Bokföring — Logga in</div>
    <div class="login-field">
      <label>Lösenord</label>
      <input type="password" id="passwordInput" placeholder="Ange lösenord..." onkeydown="if(event.key==='Enter') checkPassword()" style="font-size:1.1rem;padding:16px;border:2px solid #aaaaaa;border-radius:4px;width:100%;background:#ffffff;color:#1a1a1a;" />
    </div>
    <button class="login-btn" onclick="checkPassword()">Logga in</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header>
  <img class="logo" src="logo.JPG" alt="Palmgrens Garage" />
  <span class="bokforing-title">Bokföring</span>
</header>

<div class="main">
  <!-- LEFT: INPUT FORM -->
  <div>
    <div class="panel">
      <div class="panel-header">Ny transaktion</div>
      <div class="form-body">
        <div class="type-toggle">
          <button class="type-btn income active" onclick="setType('income')">＋ Inkomst</button>
          <button class="type-btn expense" onclick="setType('expense')">－ Utgift</button>
        </div>
        <div class="field">
          <label>Beskrivning</label>
          <input type="text" id="desc" placeholder="t.ex. Oljefilter, Styrled, etc..." />
        </div>
        <div class="field">
          <label>Belopp (kr)</label>
          <input type="number" id="amount" placeholder="0" min="0" step="0.01" />
        </div>
        <div class="field">
          <label>Datum</label>
          <input type="date" id="date" />
        </div>
        <button class="add-btn" onclick="addTransaction()">Lägg till</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: OVERVIEW -->
  <div>
    <!-- PERIOD FILTER -->
    <div class="period-panel">
      <div class="field">
        <label>Från datum</label>
        <input type="date" id="filterFrom" onchange="render()" />
      </div>
      <div class="field">
        <label>Till datum</label>
        <input type="date" id="filterTo" onchange="render()" />
      </div>
      <button class="reset-btn" onclick="resetPeriod()">Återställ period</button>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="summary">
      <div class="summary-card s-income">
        <div class="s-label">Inkomster</div>
        <div class="s-amount" id="totalIncome">0 kr</div>
      </div>
      <div class="summary-card s-expense">
        <div class="s-label">Utgifter</div>
        <div class="s-amount" id="totalExpense">0 kr</div>
      </div>
      <div class="s-balance-wrap">
        <div class="summary-card s-balance" id="balanceCard">
          <div class="s-label">Resultat<br><span class="period-label" id="periodLabel"></span></div>
          <div class="s-amount" id="balance">0 kr</div>
        </div>
      </div>
    </div>

    <!-- TRANSACTION LIST -->
    <div class="list-panel">
      <div class="list-header" style="display:flex;align-items:center;justify-content:space-between;width:100%;">
        <span>Transaktioner: <span id="txCount">0</span></span>
        <div style="display:flex;gap:8px;">
          <button onclick="refreshData()" id="refreshBtn" title="Uppdatera" style="width:32px;height:32px;font-size:2rem;background:rgba(255,255,255,0.15);border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;">🔄</button>
          <button onclick="exportCSV()" title="Exportera till Excel" style="width:32px;height:32px;font-size:0.9rem;font-weight:900;color:white;border:none;border-radius:4px;background:#1d6f42;cursor:pointer;font-family:Arial,sans-serif;">X</button>
        </div>
      </div>
      <div id="txList"></div>
    </div>
  </div>
</div>

<script>
  // ── Supabase-konfiguration ──────────────────────────────────────
  const SUPABASE_URL = 'https://upzmlulukktlogudgduw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_VO3QsGU4Y6fpb9ylH1LBzw_50M3NAFI';
  const HEADERS = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY
  };

  let currentType = 'income';
  let transactions = [];

  // ── Supabase API-anrop ──────────────────────────────────────────
  async function dbLoad() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions?select=*&order=tx_date.desc`, { headers: HEADERS });
    if (!res.ok) { console.error('Kunde inte ladda data', await res.text()); return []; }
    return await res.json();
  }

  async function dbInsert(tx) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify({ type: tx.type, description: tx.desc, amount: tx.amount, tx_date: tx.date })
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('Supabase fel:', errText);
      throw new Error(errText);
    }
    const rows = await res.json();
    return rows[0];
  }

  async function dbDelete(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    if (!res.ok) console.error('Kunde inte ta bort', await res.text());
  }

  // ── Hjälpfunktioner ─────────────────────────────────────────────
  function setType(type) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.type-btn.' + type).classList.add('active');
  }

  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function thisYearStart() { return new Date().getFullYear() + '-01-01'; }
  function thisYearEnd()   { return new Date().getFullYear() + '-12-31'; }

  function fmt(n) {
    return n.toLocaleString('sv-SE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' kr';
  }

  function formatDate(d) {
    const [y, m, day] = d.slice(0,10).split('-');
    return `${day}/${m} ${y}`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setLoading(on) {
    document.querySelector('.add-btn').textContent = on ? 'Sparar...' : 'Lägg till';
    document.querySelector('.add-btn').disabled = on;
  }

  // ── Lägg till transaktion ────────────────────────────────────────
  async function addTransaction() {
    const desc   = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const date   = document.getElementById('date').value;

    if (!desc)                        { alert('Ange en beskrivning.'); return; }
    if (isNaN(amount) || amount <= 0) { alert('Ange ett giltigt belopp.'); return; }
    if (!date)                        { alert('Välj ett datum.'); return; }

    setLoading(true);
    try {
      const saved = await dbInsert({ type: currentType, desc, amount, date });
      if (saved) {
        transactions.unshift(saved);
        render();
        document.getElementById('desc').value   = '';
        document.getElementById('amount').value = '';
        document.getElementById('date').value   = todayStr();
      }
    } catch (err) {
      alert('Fel vid sparning: ' + err.message);
      console.error(err);
    }
    setLoading(false);
  }

  // ── Ta bort transaktion ──────────────────────────────────────────
  async function deleteTransaction(id) {
    await dbDelete(id);
    transactions = transactions.filter(t => t.id !== id);
    render();
  }

  function resetPeriod() {
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value   = '';
    render();
  }

  // ── Filtrera ─────────────────────────────────────────────────────
  function getFiltered() {
    let from = document.getElementById('filterFrom').value;
    let to   = document.getElementById('filterTo').value;
    if (!from && !to) { from = thisYearStart(); to = thisYearEnd(); }
    return transactions.filter(t => {
      const d = t.tx_date.slice(0, 10);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
  }

  // ── Rendera ──────────────────────────────────────────────────────
  function render() {
    const filtered = getFiltered();
    const from = document.getElementById('filterFrom').value;
    const to   = document.getElementById('filterTo').value;

    const incomeTotal  = filtered.filter(t => t.type === 'income').reduce((s,t) => s + parseFloat(t.amount), 0);
    const expenseTotal = filtered.filter(t => t.type === 'expense').reduce((s,t) => s + parseFloat(t.amount), 0);
    const balance = incomeTotal - expenseTotal;

    document.getElementById('totalIncome').textContent  = fmt(incomeTotal);
    document.getElementById('totalExpense').textContent = fmt(expenseTotal);
    document.getElementById('balance').textContent      = (balance >= 0 ? '+' : '') + fmt(balance);
    document.getElementById('txCount').textContent = filtered.length;

    let periodStr = (!from && !to) ? 'innevarande år'
      : `${from ? formatDate(from) : '–'} → ${to ? formatDate(to) : '–'}`;
    document.getElementById('periodLabel').textContent = periodStr;

    document.getElementById('balanceCard').classList.toggle('negative', balance < 0);

    const sorted = [...filtered].sort((a,b) => b.tx_date.localeCompare(a.tx_date));
    const list = document.getElementById('txList');

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty">Inga transaktioner för vald period.</div>';
      return;
    }

    list.innerHTML = sorted.map(t => `
      <div class="tx-row">
        <span class="tx-date">${formatDate(t.tx_date)}</span>
        <span class="tx-desc">${escHtml(t.description)}</span>
        <span class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(parseFloat(t.amount))}</span>
        <button class="del-btn" onclick="deleteTransaction(${t.id})" title="Ta bort">×</button>
      </div>
    `).join('');
  }

  function exportCSV() {
    if (transactions.length === 0) { alert('Inga transaktioner att exportera.'); return; }

    const rows = [['Datum', 'Typ', 'Beskrivning', 'Belopp (kr)']];
    const sorted = [...transactions].sort((a, b) => a.tx_date.localeCompare(b.tx_date));

    sorted.forEach(t => {
      rows.push([
        t.tx_date.slice(0, 10),
        t.type === 'income' ? 'Inkomst' : 'Utgift',
        t.description,
        parseFloat(t.amount).toFixed(2).replace('.', ',')
      ]);
    });

    const csv = rows.map(r => r.map(v => `"${v}"`).join(';')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `palmgrens-garage-${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function refreshData() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    transactions = await dbLoad();
    render();
    btn.disabled = false;
  }

  // ── Lösenord ────────────────────────────────────────────────────
  async function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    const errorEl = document.getElementById('loginError');
    
    if (!input) { errorEl.textContent = 'Ange ett lösenord.'; return; }
    
    errorEl.textContent = 'Kontrollerar...';
    
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.password&select=value`, { headers: HEADERS });
      const data = await res.json();
      
      if (data && data[0] && data[0].value === input) {
        sessionStorage.setItem('pg_auth', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        init();
      } else {
        errorEl.textContent = 'Fel lösenord, försök igen.';
        document.getElementById('passwordInput').value = '';
      }
    } catch (err) {
      errorEl.textContent = 'Något gick fel, försök igen.';
    }
  }

  // ── Init ─────────────────────────────────────────────────────────
  async function init() {
    // Kolla om redan inloggad
    if (sessionStorage.getItem('pg_auth') !== 'true') return;
    
    document.getElementById('date').value = todayStr();
    document.getElementById('txList').innerHTML = '<div class="empty">Laddar...</div>';
    transactions = await dbLoad();
    render();
  }

  // Kolla session vid start
  if (sessionStorage.getItem('pg_auth') === 'true') {
    document.getElementById('loginScreen').style.display = 'none';
    init();
  }
</script>
</body>
</html>
