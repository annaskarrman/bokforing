<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palmgrens garage</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e4dc;
    --text-muted: #666;
    --text-dim: #999;
    --income: #4ade80;
    --income-bg: rgba(74, 222, 128, 0.08);
    --income-border: rgba(74, 222, 128, 0.2);
    --expense: #f87171;
    --expense-bg: rgba(248, 113, 113, 0.08);
    --expense-border: rgba(248, 113, 113, 0.2);
    --gold: #d4a853;
    --gold-dim: rgba(212, 168, 83, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,168,83,0.07) 0%, transparent 60%);
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  header img.logo {
    height: 80px;
    width: auto;
    background: white;
    border-radius: 8px;
    padding: 6px 10px;
  }

  header span.bokforing-title {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 40px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 32px;
    align-items: start;
  }

  /* LEFT PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .form-body { padding: 20px 24px 24px; }

  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }

  .type-btn {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-dim);
    transition: all 0.2s;
  }

  .type-btn.income.active {
    background: var(--income-bg);
    border-color: var(--income-border);
    color: var(--income);
  }

  .type-btn.expense.active {
    background: var(--expense-bg);
    border-color: var(--expense-border);
    color: var(--expense);
  }

  .type-btn:not(.active):hover { border-color: #444; color: var(--text); }

  .field { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="number"],
  input[type="date"],
  select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
  }

  input:focus, select:focus { border-color: var(--gold); }

  input[type="number"] { font-family: 'DM Mono', monospace; }

  .add-btn {
    width: 100%;
    margin-top: 8px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: var(--gold);
    color: #0f0f0f;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.98); }

  /* PERIOD FILTER */
  .period-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
  }

  .period-panel .field { margin: 0; flex: 1; min-width: 140px; }

  .reset-btn {
    padding: 10px 18px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* SUMMARY */
  .summary {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .summary-card .s-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .summary-card .s-amount {
    font-family: 'DM Mono', monospace;
    font-size: 1.4rem;
    font-weight: 500;
  }

  .s-income .s-amount { color: var(--income); }
  .s-expense .s-amount { color: var(--expense); }

  .s-balance .s-amount { color: var(--gold); font-size: 1.5rem; }
  .s-balance.negative .s-amount { color: var(--expense); }
  .s-balance { border-color: rgba(212,168,83,0.25); background: var(--gold-dim); }
  .s-balance.negative { border-color: var(--expense-border); background: var(--expense-bg); }

  /* TRANSACTION LIST */
  .list-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .list-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .list-header span:first-child {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .list-header span:last-child {
    font-size: 0.8rem;
    color: var(--text-muted);
  }

  .empty {
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .tx-row {
    display: grid;
    grid-template-columns: 90px 1fr 120px 36px;
    gap: 16px;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .tx-row:last-child { border-bottom: none; }
  .tx-row:hover { background: var(--surface2); }

  .tx-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .tx-desc {
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tx-amount {
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    font-weight: 500;
    text-align: right;
  }

  .tx-amount.income { color: var(--income); }
  .tx-amount.expense { color: var(--expense); }

  .del-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: all 0.15s;
  }

  .del-btn:hover { background: var(--expense-bg); color: var(--expense); }

  .period-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-style: italic;
  }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; padding: 20px; }
    .summary { grid-template-columns: 1fr; }
    header { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="logo.JPG" alt="Palmgrens Garage" />
  <span class="bokforing-title">Bokföring</span>
</header>

<div class="main">
  <!-- LEFT: INPUT FORM -->
  <div>
    <div class="panel">
      <div class="panel-header">Ny transaktion</div>
      <div class="form-body">
        <div class="type-toggle">
          <button class="type-btn income active" onclick="setType('income')">＋ Inkomst</button>
          <button class="type-btn expense" onclick="setType('expense')">－ Utgift</button>
        </div>
        <div class="field">
          <label>Beskrivning</label>
          <input type="text" id="desc" placeholder="t.ex. Oljefilter, Styrled, etc..." />
        </div>
        <div class="field">
          <label>Belopp (kr)</label>
          <input type="number" id="amount" placeholder="0" min="0" step="0.01" />
        </div>
        <div class="field">
          <label>Datum</label>
          <input type="date" id="date" />
        </div>
        <button class="add-btn" onclick="addTransaction()">Lägg till</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: OVERVIEW -->
  <div>
    <!-- PERIOD FILTER -->
    <div class="period-panel">
      <div class="field">
        <label>Från datum</label>
        <input type="date" id="filterFrom" onchange="render()" />
      </div>
      <div class="field">
        <label>Till datum</label>
        <input type="date" id="filterTo" onchange="render()" />
      </div>
      <button class="reset-btn" onclick="resetPeriod()">Återställ period</button>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="summary">
      <div class="summary-card s-income">
        <div class="s-label">Inkomster</div>
        <div class="s-amount" id="totalIncome">0 kr</div>
      </div>
      <div class="summary-card s-expense">
        <div class="s-label">Utgifter</div>
        <div class="s-amount" id="totalExpense">0 kr</div>
      </div>
      <div class="summary-card s-balance" id="balanceCard">
        <div class="s-label">Resultat <span class="period-label" id="periodLabel"></span></div>
        <div class="s-amount" id="balance">0 kr</div>
      </div>
    </div>

    <!-- TRANSACTION LIST -->
    <div class="list-panel">
      <div class="list-header">
        <span>Transaktioner</span>
        <div style="display:flex;align-items:center;gap:12px;">
          <span id="txCount">0 poster</span>
          <button class="reset-btn" onclick="refreshData()" id="refreshBtn" style="padding:6px 12px;font-size:0.75rem;">↻ Uppdatera</button>
        </div>
      </div>
      <div id="txList"></div>
    </div>
  </div>
</div>

<script>
  // ── Supabase-konfiguration ──────────────────────────────────────
  const SUPABASE_URL = 'https://upzmlulukktlogudgduw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_VO3QsGU4Y6fpb9ylH1LBzw_50M3NAFI';
  const HEADERS = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY
  };

  let currentType = 'income';
  let transactions = [];

  // ── Supabase API-anrop ──────────────────────────────────────────
  async function dbLoad() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions?select=*&order=tx_date.desc`, { headers: HEADERS });
    if (!res.ok) { console.error('Kunde inte ladda data', await res.text()); return []; }
    return await res.json();
  }

  async function dbInsert(tx) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=representation' },
      body: JSON.stringify({ type: tx.type, description: tx.desc, amount: tx.amount, tx_date: tx.date })
    });
    if (!res.ok) {
      const errText = await res.text();
      console.error('Supabase fel:', errText);
      throw new Error(errText);
    }
    const rows = await res.json();
    return rows[0];
  }

  async function dbDelete(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    if (!res.ok) console.error('Kunde inte ta bort', await res.text());
  }

  // ── Hjälpfunktioner ─────────────────────────────────────────────
  function setType(type) {
    currentType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.type-btn.' + type).classList.add('active');
  }

  function todayStr() { return new Date().toISOString().slice(0, 10); }
  function thisYearStart() { return new Date().getFullYear() + '-01-01'; }
  function thisYearEnd()   { return new Date().getFullYear() + '-12-31'; }

  function fmt(n) {
    return n.toLocaleString('sv-SE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' kr';
  }

  function formatDate(d) {
    const [y, m, day] = d.slice(0,10).split('-');
    return `${day}/${m} ${y}`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setLoading(on) {
    document.querySelector('.add-btn').textContent = on ? 'Sparar...' : 'Lägg till';
    document.querySelector('.add-btn').disabled = on;
  }

  // ── Lägg till transaktion ────────────────────────────────────────
  async function addTransaction() {
    const desc   = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const date   = document.getElementById('date').value;

    if (!desc)                        { alert('Ange en beskrivning.'); return; }
    if (isNaN(amount) || amount <= 0) { alert('Ange ett giltigt belopp.'); return; }
    if (!date)                        { alert('Välj ett datum.'); return; }

    setLoading(true);
    try {
      const saved = await dbInsert({ type: currentType, desc, amount, date });
      if (saved) {
        transactions.unshift(saved);
        render();
        document.getElementById('desc').value   = '';
        document.getElementById('amount').value = '';
        document.getElementById('date').value   = todayStr();
      }
    } catch (err) {
      alert('Fel vid sparning: ' + err.message);
      console.error(err);
    }
    setLoading(false);
  }

  // ── Ta bort transaktion ──────────────────────────────────────────
  async function deleteTransaction(id) {
    await dbDelete(id);
    transactions = transactions.filter(t => t.id !== id);
    render();
  }

  function resetPeriod() {
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value   = '';
    render();
  }

  // ── Filtrera ─────────────────────────────────────────────────────
  function getFiltered() {
    let from = document.getElementById('filterFrom').value;
    let to   = document.getElementById('filterTo').value;
    if (!from && !to) { from = thisYearStart(); to = thisYearEnd(); }
    return transactions.filter(t => {
      const d = t.tx_date.slice(0, 10);
      if (from && d < from) return false;
      if (to   && d > to)   return false;
      return true;
    });
  }

  // ── Rendera ──────────────────────────────────────────────────────
  function render() {
    const filtered = getFiltered();
    const from = document.getElementById('filterFrom').value;
    const to   = document.getElementById('filterTo').value;

    const incomeTotal  = filtered.filter(t => t.type === 'income').reduce((s,t) => s + parseFloat(t.amount), 0);
    const expenseTotal = filtered.filter(t => t.type === 'expense').reduce((s,t) => s + parseFloat(t.amount), 0);
    const balance = incomeTotal - expenseTotal;

    document.getElementById('totalIncome').textContent  = fmt(incomeTotal);
    document.getElementById('totalExpense').textContent = fmt(expenseTotal);
    document.getElementById('balance').textContent      = (balance >= 0 ? '+' : '') + fmt(balance);
    document.getElementById('txCount').textContent      = filtered.length + ' poster';

    let periodStr = (!from && !to) ? 'innevarande år'
      : `${from ? formatDate(from) : '–'} → ${to ? formatDate(to) : '–'}`;
    document.getElementById('periodLabel').textContent = periodStr;

    document.getElementById('balanceCard').classList.toggle('negative', balance < 0);

    const sorted = [...filtered].sort((a,b) => b.tx_date.localeCompare(a.tx_date));
    const list = document.getElementById('txList');

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty">Inga transaktioner för vald period.</div>';
      return;
    }

    list.innerHTML = sorted.map(t => `
      <div class="tx-row">
        <span class="tx-date">${formatDate(t.tx_date)}</span>
        <span class="tx-desc">${escHtml(t.description)}</span>
        <span class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(parseFloat(t.amount))}</span>
        <button class="del-btn" onclick="deleteTransaction(${t.id})" title="Ta bort">×</button>
      </div>
    `).join('');
  }

  async function refreshData() {
    const btn = document.getElementById('refreshBtn');
    btn.textContent = '↻ Laddar...';
    btn.disabled = true;
    transactions = await dbLoad();
    render();
    btn.textContent = '↻ Uppdatera';
    btn.disabled = false;
  }

  // ── Init ─────────────────────────────────────────────────────────
  async function init() {
    document.getElementById('date').value = todayStr();
    document.getElementById('txList').innerHTML = '<div class="empty">Laddar...</div>';
    transactions = await dbLoad();
    render();
  }

  init();
</script>
</body>
</html>
